name: CRA Security & SBOM
on: 
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs: 
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install cyclonedx.py
      - name: Remove old SBOMs
        run: rm -f sbom.cdx.json sbom.spdx.json
      - name: Generate CycloneDX SBOM
        run: cyclonedx-py environment --output-format json --output-file sbom.cdx.json
      - name: Generate SPDX SBOM
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'spdx-json'
          output: 'sbom.spdx.json'
          scanners: 'vuln'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'
      - name: Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          scanners: 'vuln'
          severity: 'LOW,MEDIUM,HIGH,CRITICAL'
          exit-code: '0'
      - name: Commit updated SBOMs
        uses: stefanzweifel/git-auto-commit-action@v7
        with: 
          commit_message: "Updating SBOM files [skip ci]"
          file_pattern: "sbom.cdx.json sbom.spdx.json" 
          



          